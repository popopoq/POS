<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>品味餐館 POS</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="品味餐館">

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --dark: #343a40; --bg: #f4f7f6; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 10px; background: var(--bg); padding-bottom: 120px; }
        
        /* 基礎 UI */
        .category-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab { flex: 0 0 calc(20% - 8px); min-width: 70px; text-align: center; padding: 12px 0; background: white; border: 1px solid #ddd; border-radius: 12px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .menu-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: white; border-radius: 12px; cursor: pointer; border: 1px solid #eee; }
        
        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; }
        .modal-content { background: white; margin: 3% auto; padding: 20px; width: 88%; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        
        /* 管理區樣式 */
        .admin-section { border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .admin-header { background: #f8f9fa; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .admin-content { display: none; background: white; padding: 10px; border-top: 1px solid #eee; }
        .admin-section.active .admin-content { display: block; }
        .admin-section.active > .admin-header::after { content: "▲"; font-size: 12px; color: #999; }
        .admin-header::after { content: "▼"; font-size: 12px; color: #999; }

        .sub-admin-section { border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
        .sub-admin-header { background: #ececec; padding: 10px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .sub-admin-content { display: none; background: white; padding: 5px; }
        .sub-admin-section.active .sub-admin-content { display: block; }

        .report-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 10px; }
        .report-tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #666; font-weight: bold; }
        .report-tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }

        /* 拖曳手把 */
        .sort-handle { cursor: grab; padding: 5px 15px 5px 5px; color: #ccc; font-size: 20px; }

        /* 訂單與按鈕 */
        .order-card { background: white; border-left: 6px solid var(--warning); padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .cart-card { background: #fff; padding: 15px; border-radius: 15px; border: 2px solid var(--primary); }
        .memo-btn { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: bold; display: inline-flex; align-items: center; }
        .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); background: white; color: var(--primary); font-size: 28px; font-weight: bold; }
        
        .modal-qty-input { width: 80px; height: 50px; text-align: center; border: 2px solid #ddd; border-radius: 10px; font-size: 32px; font-weight: bold; }

        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #ddd; padding: 10px; z-index: 1000; }
        .footer-nav button { flex: 1; background: none; border: none; font-weight: bold; padding: 10px; font-size: 16px; color: #666; }
        .footer-nav button.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="page-order">
        <h2>🍴 品味餐館 - 點餐</h2>
        <div id="category-tabs-display" class="category-tabs"></div>
        <div id="menu-display" class="menu-grid"></div>
        <div class="cart-card">
            <div id="cart-items"></div>
            <div style="margin-top:10px;"><input type="text" id="cust-name" placeholder="桌號 / 客名 (選填)" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; font-size:16px;"></div>
            <div style="font-size: 2.2em; font-weight: 900; color: var(--danger); text-align: right; margin: 10px 0;">$ <span id="cart-total">0</span></div>
            <button onclick="submitOrder()" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; font-size:1.5em; font-weight:bold;">成立訂單</button>
        </div>
    </div>

    <div id="page-queue" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div id="daily-total-display" style="font-weight:bold; color:var(--danger); font-size:1.1em;">今日累計: $0</div>
            <button onclick="dailySettlement()" style="background:var(--warning); border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">💰 今日結算</button>
        </div>
        <div class="category-tabs">
            <div id="tab-wait" class="tab active" onclick="switchQueueTab('waiting')">未完成</div>
            <div id="tab-done" class="tab" onclick="switchQueueTab('done')">已完成</div>
        </div>
        <div id="queue-orders-list"></div>
    </div>

    <div id="qty-modal" class="modal" style="z-index: 3000;">
        <div class="modal-content" style="margin-top: 15%;">
            <h3 id="qty-modal-title" style="text-align:center;"></h3>
            <div style="display:flex; align-items:center; justify-content:center; gap:20px; margin:15px 0;">
                <button class="btn-circle" onclick="adjustModalQty(-1)">-</button>
                <input type="number" id="modal-qty-val" class="modal-qty-input" value="1" onfocus="this.select()">
                <button class="btn-circle" onclick="adjustModalQty(1)">+</button>
            </div>
            <div id="memo-tags-display" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px;"></div>
            <input type="text" id="modal-memo-input" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;" placeholder="手寫備註...">
            
            <div style="margin-top:10px; padding:10px; background:#fff3cd; border-radius:8px; display:flex; align-items:center; gap:10px;">
                <b>💰 調整金額:</b>
                <input type="number" id="modal-price-adj" placeholder="0" style="width:80px; padding:8px; border:1px solid #ccc; border-radius:5px;">
                <small>(加錢填正, 減錢填負)</small>
            </div>

            <button id="modal-confirm-btn" onclick="confirmQtyAction()" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; font-size:20px; font-weight:bold; margin-top:20px;">確認</button>
            <button onclick="closeModal('qty-modal')" style="width:100%; padding:10px; border:none; background:none; color:gray;">取消</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0 0 15px 0;">⚙️ 系統設定</h2>
            
            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)">📈 營收報表中心</div>
                <div class="admin-content">
                    <div class="report-tabs">
                        <div id="rep-tab-day" class="report-tab active" onclick="switchReportTab('day')">日結</div>
                        <div id="rep-tab-month" class="report-tab" onclick="switchReportTab('month')">月結</div>
                        <div id="rep-tab-year" class="report-tab" onclick="switchReportTab('year')">年結</div>
                    </div>

                    <div id="rep-content-day">
                        <div style="display:flex; gap:5px; margin-bottom:10px;">
                            <button onclick="settleToTarget('month')" style="flex:1; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold;">執行月結算 (從日結彙整)</button>
                            <button onclick="clearHistoryByType('day')" style="padding:10px; background:#f8d7da; color:#721c24; border:none; border-radius:5px;">清空</button>
                        </div>
                        <div id="list-day"></div>
                    </div>

                    <div id="rep-content-month" style="display:none;">
                        <div style="display:flex; gap:5px; margin-bottom:10px;">
                            <button onclick="settleToTarget('year')" style="flex:1; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold;">執行年結算 (從月結彙整)</button>
                            <button onclick="clearHistoryByType('month')" style="padding:10px; background:#f8d7da; color:#721c24; border:none; border-radius:5px;">清空</button>
                        </div>
                        <div id="list-month"></div>
                    </div>

                    <div id="rep-content-year" style="display:none;">
                        <button onclick="clearHistoryByType('year')" style="width:100%; padding:10px; background:#f8d7da; color:#721c24; border:none; border-radius:5px; margin-bottom:10px;">清空年結</button>
                        <div id="list-year"></div>
                    </div>
                </div>
            </div>

            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)">🍎 菜單品項管理</div>
                <div class="admin-content">
                    <div style="background:#f0f0f0; padding:10px; border-radius:8px; margin-bottom:15px;">
                        <p style="margin:0 0 5px 0; font-weight:bold; font-size:14px;">➕ 新增菜色</p>
                        <div style="display:flex; flex-wrap:wrap; gap:5px;">
                            <input type="text" id="new-item-name" placeholder="菜名" style="flex:2; padding:8px; border:1px solid #ddd; border-radius:5px;">
                            <input type="number" id="new-item-price" placeholder="價格" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:5px;">
                            <select id="new-item-cat" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:5px;">
                                <option value="主食">主食</option>
                                <option value="湯品">湯品</option>
                                <option value="小菜">小菜</option>
                                <option value="其他">其他</option>
                                <option value="飲料">飲料</option>
                            </select>
                            <button onclick="addMenuItem()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; font-weight:bold;">新增至菜單</button>
                        </div>
                    </div>
                    <div id="admin-menu-list"></div>
                </div>
            </div>

            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)">💬 常用備註標籤</div>
                <div class="admin-content">
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <input type="text" id="new-memo-input" placeholder="新標籤" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:5px;">
                        <button onclick="addMemoLabel()" style="padding:8px 15px; background:var(--primary); color:white; border:none; border-radius:5px;">新增</button>
                    </div>
                    <div id="admin-memo-drag-list" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
                </div>
            </div>

            <button onclick="closeModal('settings-modal')" style="width:100%; padding:15px; background:var(--dark); color:white; border:none; border-radius:10px; font-weight:bold; margin-top:20px;">完成並退出</button>
        </div>
    </div>

    <div class="footer-nav">
        <button id="nav-order" class="active" onclick="showPage('order')">🔘 點餐</button>
        <button id="nav-queue" onclick="showPage('queue')">📋 等單 (<span id="queue-count">0</span>)</button>
        <button onclick="openSettings()">⚙️ 管理</button>
    </div>

    <script>
        const categories = ['主食','湯品','小菜','其他','飲料'];
        const catWeight = { "主食": 1, "湯品": 2, "小菜": 3, "其他": 4, "飲料": 5 };
        
        let menu = JSON.parse(localStorage.getItem('myMenu')) || [{name:'肉燥飯', price:35, category:'主食'}];
        let memos = JSON.parse(localStorage.getItem('myMemos')) || ['微辣','❌蔥','外帶','加辣'];
        let cart = [], orders = JSON.parse(localStorage.getItem('myOrders')) || [];
        let history = JSON.parse(localStorage.getItem('myHistory')) || [];
        let currentCat = '主食', queueTab = 'waiting', editingCartIdx = null;

        function init() { renderTabs(); renderMenu(currentCat); renderCart(); renderQueue(); }
        function showPage(p) {
            document.getElementById('page-order').style.display = p==='order'?'block':'none';
            document.getElementById('page-queue').style.display = p==='queue'?'block':'none';
            document.getElementById('nav-order').className = p==='order'?'active':'';
            document.getElementById('nav-queue').className = p==='queue'?'active':'';
            if(p==='queue') renderQueue();
        }
        function switchQueueTab(t) { queueTab = t; renderQueue(); }
        function toggleAdminSection(header) { header.parentElement.classList.toggle('active'); }
        function toggleSubAdmin(btn) { btn.closest('.sub-admin-section').classList.toggle('active'); }

        function autoSortMenu() {
            menu.sort((a, b) => {
                if (a.category !== b.category) return catWeight[a.category] - catWeight[b.category];
                return a.name.localeCompare(b.name, 'zh-Hant');
            });
            localStorage.setItem('myMenu', JSON.stringify(menu));
        }

        function renderTabs() {
            document.getElementById('category-tabs-display').innerHTML = categories.map(c => `<div class="tab ${c===currentCat?'active':''}" onclick="changeCat('${c}')">${c}</div>`).join('');
        }
        function changeCat(c) { currentCat = c; renderTabs(); renderMenu(c); }
        function renderMenu(cat) {
            document.getElementById('menu-display').innerHTML = menu.filter(m => m.category === cat).map(i => `<div class="menu-item" onclick="openQtyModal('${i.name}', ${i.price}, '${i.category}')"><b>${i.name}</b> <span>$${i.price}</span></div>`).join('');
        }

        function openQtyModal(name, price, category, editIdx = null) {
            editingCartIdx = editIdx;
            currentItemTarget = { name, price, category };
            document.getElementById('qty-modal-title').innerText = editIdx !== null ? "修改: " + name : name;
            document.getElementById('modal-price-adj').value = (editIdx !== null && cart[editIdx].adj) ? cart[editIdx].adj : "";
            if (editIdx !== null) {
                document.getElementById('modal-qty-val').value = cart[editIdx].qty;
                document.getElementById('modal-memo-input').value = cart[editIdx].memo;
                document.getElementById('modal-confirm-btn').innerText = "確認修改";
            } else {
                document.getElementById('modal-qty-val').value = "1";
                document.getElementById('modal-memo-input').value = "";
                document.getElementById('modal-confirm-btn').innerText = "加入清單";
            }
            document.getElementById('memo-tags-display').innerHTML = memos.map(m => `<button class="memo-btn" onclick="addMemoToInput('${m}')">${m}</button>`).join('') + `<button class="memo-btn" style="background:#eee;" onclick="document.getElementById('modal-memo-input').value=''">🧹</button>`;
            document.getElementById('qty-modal').style.display = 'block';
        }

        function addMemoToInput(t) { let i = document.getElementById('modal-memo-input'); i.value = i.value ? i.value+","+t : t; }
        function adjustModalQty(d) { let el = document.getElementById('modal-qty-val'); let v = parseInt(el.value) || 1; el.value = Math.max(1, v+d); }

        function confirmQtyAction() {
            const qty = parseInt(document.getElementById('modal-qty-val').value) || 1;
            const memo = document.getElementById('modal-memo-input').value;
            const adj = parseInt(document.getElementById('modal-price-adj').value) || 0;
            const finalPrice = currentItemTarget.price + adj;

            if (editingCartIdx !== null) {
                cart[editingCartIdx].qty = qty; cart[editingCartIdx].memo = memo; cart[editingCartIdx].adj = adj; cart[editingCartIdx].finalP = finalPrice;
            } else {
                cart.push({...currentItemTarget, qty, memo, adj, finalP: finalPrice});
            }
            renderCart(); closeModal('qty-modal');
        }

        function renderCart() {
            let t = 0;
            document.getElementById('cart-items').innerHTML = cart.map((i,idx) => { 
                let itemTotal = (i.finalP || i.price) * i.qty;
                t += itemTotal; 
                return `
                <div style="padding:10px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <div style="flex:1;"><b>${i.name} x ${i.qty}</b> ($${i.finalP || i.price})<br><small style="color:red;">${i.memo?'('+i.memo+')':''}</small></div>
                    <div style="display:flex; gap:10px;">
                        <button onclick="openQtyModal('${i.name}', ${i.price}, '${i.category}', ${idx})" style="border:1px solid #ddd; background:none; padding:5px 8px; border-radius:5px; font-size:16px;">🖊️</button>
                        <button onclick="cart.splice(${idx},1);renderCart()" style="color:red; border:none; background:none; font-size:24px; font-weight:bold;">✕</button>
                    </div>
                </div>`; 
            }).join('') || '<p style="text-align:center; color:gray;">🛒 購物車為空</p>';
            document.getElementById('cart-total').innerText = t;
        }

        function submitOrder() {
            if(!cart.length) return;
            orders.unshift({ id: Date.now(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), name: document.getElementById('cust-name').value.trim(), items: [...cart], total: document.getElementById('cart-total').innerText, status: 'waiting' });
            localStorage.setItem('myOrders', JSON.stringify(orders)); cart = []; renderCart(); document.getElementById('cust-name').value = ""; showPage('queue');
        }

        function renderQueue() {
            const list = orders.filter(o => o.status === queueTab);
            document.getElementById('daily-total-display').innerText = `今日累計: $${orders.filter(o=>o.status==='done').reduce((sum,o)=>sum+parseInt(o.total),0)}`;
            document.getElementById('queue-count').innerText = orders.filter(o=>o.status==='waiting').length;
            document.getElementById('queue-orders-list').innerHTML = list.map(o => `
                <div class="order-card">
                    <b>👤 ${o.name || '(未填)'}</b> <small>🕒 ${o.time}</small><br>
                    ${o.items.map(i => `• ${i.name} x ${i.qty} $${i.finalP||i.price} <span style="color:red;">${i.memo?'('+i.memo+')':''}</span>`).join('<br>')}
                    <div style="text-align:right; font-weight:bold; color:var(--danger);">$${o.total}</div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        ${o.status==='waiting' ? `
                            <button onclick="updateStatus(${o.id}, 'done')" style="flex:2; padding:10px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold;">✅ 結單</button>
                            <button onclick="editOrder(${o.id})" style="flex:1; padding:10px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:bold;">✏️ 修改</button>
                        ` : ''}
                        <button onclick="printOrder(${o.id})" style="flex:1; background:var(--dark); color:white; border:none; border-radius:8px; padding:10px;">🖨️ 列印</button>
                        <button onclick="deleteOrder(${o.id})" style="color:red; border:none; background:none;">🗑️</button>
                    </div>
                </div>`).join('');
        }

        function editOrder(id) {
            const o = orders.find(x => x.id === id);
            if(o) {
                cart = JSON.parse(JSON.stringify(o.items));
                document.getElementById('cust-name').value = o.name;
                orders = orders.filter(x => x.id !== id);
                localStorage.setItem('myOrders', JSON.stringify(orders));
                showPage('order'); renderCart();
            }
        }

        function updateStatus(id, s) { let o=orders.find(o=>o.id===id); if(o) o.status=s; localStorage.setItem('myOrders', JSON.stringify(orders)); renderQueue(); }
        function deleteOrder(id) { if(confirm('刪除訂單？')){orders=orders.filter(o=>o.id!==id);localStorage.setItem('myOrders',JSON.stringify(orders));renderQueue();}}

        function printOrder(id) {
            const o = orders.find(x => x.id === id);
            const nowTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const printHTML = `<html><head><title>單據</title><style>body{font-family:sans-serif;padding:10px;line-height:1.4;}.title{text-align:center;font-size:26px;font-weight:bold;}.info{display:flex;justify-content:space-between;font-size:20px;margin:10px 0;}.item{font-size:20px;font-weight:bold;}.memo{font-size:18px;padding-left:15px;}.total{text-align:right;font-size:24px;font-weight:bold;}</style></head>
                <body><div class="title">品味餐館</div><hr><div class="info"><span>👤 ${o.name||'現場'}</span><span>🕒 ${nowTime}</span></div><hr>
                ${o.items.map(i=>`<div class="item">• ${i.name} x ${i.qty} ($${i.finalP||i.price})</div>${i.memo?`<div class="memo">> ${i.memo}</div>`:''}`).join('')}<hr>
                <div class="total">總計: $${o.total}</div><script>window.onload=function(){window.print();setTimeout(function(){window.close();},500);};<\/script></body></html>`;
            const win = window.open('','_blank'); win.document.write(printHTML); win.document.close();
        }

        function switchReportTab(t) {
            ['day','month','year'].forEach(type => {
                document.getElementById('rep-tab-'+type).className = 'report-tab ' + (type===t?'active':'');
                document.getElementById('rep-content-'+type).style.display = type===t?'block':'none';
            });
            renderHistoryLists();
        }

        function renderHistoryLists() {
            ['day','month','year'].forEach(type => {
                const list = history.filter(h => h.type === type || (!h.type && type==='day'));
                document.getElementById('list-'+type).innerHTML = list.map((h, idx) => `
                    <div style="padding:10px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                        <div>📅 ${h.date}：<b>$${h.amount}</b></div>
                        <button onclick="deleteHistoryItemByID(${h.id || 0}, ${idx})" style="color:red; border:1px solid red; background:none; padding:4px 8px; border-radius:5px; font-size:12px;">刪除</button>
                    </div>`).join('') || '<p style="text-align:center; color:gray;">無紀錄</p>';
            });
        }

        function deleteHistoryItemByID(id, idx) {
            if(confirm('確定刪除？')) {
                if(id) history = history.filter(h => h.id !== id); else history.splice(idx, 1);
                localStorage.setItem('myHistory', JSON.stringify(history)); renderHistoryLists();
            }
        }

        function clearHistoryByType(t) {
            if(confirm('確定清空？')) { history = history.filter(h => h.type !== t && (t!=='day' || h.type)); localStorage.setItem('myHistory', JSON.stringify(history)); renderHistoryLists(); }
        }

        function settleToTarget(target) {
            const now = new Date();
            let filterType = target === 'month' ? 'day' : 'month';
            const source = history.filter(h => h.type === filterType || (!h.type && filterType==='day'));
            if(!source.length) return alert('無資料彙整');
            const sum = source.reduce((s, h) => s + h.amount, 0);
            const label = target === 'month' ? `${now.getFullYear()}/${now.getMonth()+1} 月結` : `${now.getFullYear()} 年結`;
            if(confirm(`彙整金額 $${sum} 執行 [${label}]？`)){
                history.unshift({ id: Date.now(), type: target, date: label, amount: sum });
                localStorage.setItem('myHistory', JSON.stringify(history)); renderHistoryLists();
            }
        }

        function dailySettlement() {
            const total = orders.filter(o=>o.status==='done').reduce((sum,o)=>sum+parseInt(o.total),0);
            if(total===0) return;
            if(confirm(`結算今日營收 $${total}？`)){
                history.unshift({ id: Date.now(), type: 'day', date: new Date().toLocaleDateString(), amount: total });
                orders = orders.filter(o=>o.status!=='done');
                localStorage.setItem('myHistory', JSON.stringify(history)); localStorage.setItem('myOrders', JSON.stringify(orders));
                renderQueue();
            }
        }

        function openSettings() { renderHistoryLists(); renderAdminMenuLists(); renderAdminMemoList(); document.getElementById('settings-modal').style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display='none'; }

        // --- 保持原本的拖曳與管理邏輯 ---
        function renderAdminMenuLists() {
            let h = ""; 
            categories.forEach(c => { 
                let it = menu.filter(m=>m.category===c); 
                h += `<div class="sub-admin-section"><div class="sub-admin-header"><span>${c}類 (${it.length})</span><button onclick="toggleSubAdmin(this)" style="padding:4px 8px; font-size:12px; background:#666; color:white; border:none; border-radius:4px;">展開/收合</button></div>
                    <div class="sub-admin-content" id="list-${c}">${it.map(m=> `<div class="admin-sort-item" data-name="${m.name}" style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;"><div><span class="sort-handle">☰</span>${m.name}($${m.price})</div><button onclick="deleteMenuItemByName('${m.name}', '${c}')" style="color:red; border:1px solid red; border-radius:5px; padding:2px 8px; font-size:12px;">刪除</button></div>`).join('') || '無項目'}</div></div>`;
            });
            document.getElementById('admin-menu-list').innerHTML = h;
            categories.forEach(c => {
                const el = document.getElementById('list-' + c);
                if(el) new Sortable(el, { handle: '.sort-handle', animation: 150, onEnd: function() {
                    const sortedNames = Array.from(el.querySelectorAll('.admin-sort-item')).map(i => i.getAttribute('data-name'));
                    const others = menu.filter(m => m.category !== c);
                    const current = sortedNames.map(name => menu.find(m => m.name === name && m.category === c));
                    menu = [...others, ...current]; localStorage.setItem('myMenu', JSON.stringify(menu)); renderMenu(currentCat);
                }});
            });
        }

        function addMenuItem() {
            const n = document.getElementById('new-item-name').value.trim(), p = document.getElementById('new-item-price').value, c = document.getElementById('new-item-cat').value;
            if(n && p) { menu.push({name:n, price:parseInt(p), category:c}); autoSortMenu(); document.getElementById('new-item-name').value = ""; document.getElementById('new-item-price').value = ""; renderAdminMenuLists(); renderMenu(currentCat); }
        }

        function deleteMenuItemByName(name, cat) { if(confirm('刪除？')){ menu = menu.filter(m => !(m.name === name && m.category === cat)); localStorage.setItem('myMenu', JSON.stringify(menu)); renderAdminMenuLists(); renderMenu(currentCat); }}

        function renderAdminMemoList() {
            const container = document.getElementById('admin-memo-drag-list');
            container.innerHTML = memos.map((m,idx) => `<div class="memo-item" data-id="${m}" style="display:inline-flex; align-items:center; background:white; border:1px solid #ddd; padding:8px; border-radius:8px;"><span class="sort-handle" style="font-size:14px; padding-right:5px;">☰</span>${m}<span onclick="deleteMemoLabel(${idx})" style="color:red; cursor:pointer; margin-left:8px; font-weight:bold;">✕</span></div>`).join('');
            new Sortable(container, { handle: '.sort-handle', animation: 150, onEnd: function() { memos = Array.from(container.querySelectorAll('.memo-item')).map(i => i.getAttribute('data-id')); localStorage.setItem('myMemos', JSON.stringify(memos)); }});
        }
        function addMemoLabel() { const i = document.getElementById('new-memo-input'); if(i.value.trim()){ memos.push(i.value.trim()); i.value=''; localStorage.setItem('myMemos', JSON.stringify(memos)); renderAdminMemoList(); }}
        function deleteMemoLabel(idx) { memos.splice(idx,1); localStorage.setItem('myMemos', JSON.stringify(memos)); renderAdminMemoList(); }

        init();
    </script>
</body>
</html>
