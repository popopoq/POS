<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>品味餐館 POS</title>
    
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="品味餐館">

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --dark: #343a40; --bg: #f4f7f6; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 10px; background: var(--bg); padding-bottom: 120px; }
        
        /* 基礎 UI */
        .category-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; background: white; border: 1px solid #ddd; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .menu-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: white; border-radius: 12px; cursor: pointer; border: 1px solid #eee; }
        
        /* 訂單卡片 */
        .cart-card { background: #fff; padding: 15px; border-radius: 15px; border: 2px solid var(--primary); }
        .order-card { background: white; border-left: 6px solid var(--warning); padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .order-card.done { border-left-color: #ccc; opacity: 0.8; }
        
        /* 彈窗 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; }
        .modal-content { background: white; margin: 3% auto; padding: 20px; width: 88%; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        
        /* 管理區摺疊樣式 (第一層) */
        .admin-section { border: 1px solid #ddd; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
        .admin-header { background: #f8f9fa; padding: 15px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .admin-content { display: none; background: white; padding: 10px; border-top: 1px solid #eee; }
        .admin-section.active .admin-content { display: block; }
        .admin-section.active > .admin-header::after { content: "▲"; font-size: 12px; color: #999; }
        .admin-header::after { content: "▼"; font-size: 12px; color: #999; }

        /* 管理區摺疊樣式 (第二層 - 菜單分類) */
        .sub-admin-section { border: 1px solid #eee; border-radius: 8px; margin-bottom: 8px; }
        .sub-admin-header { background: #ececec; padding: 10px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .sub-admin-content { display: none; background: white; padding: 5px; }
        .sub-admin-section.active .sub-admin-content { display: block; }
        .sub-admin-section.active .sub-admin-header::after { content: "▲"; font-size: 10px; }
        .sub-admin-header::after { content: "▼"; font-size: 10px; }

        /* 備註與按鈕 */
        .memo-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .memo-btn { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: bold; }
        .qty-input-group { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
        .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); background: white; color: var(--primary); font-size: 28px; font-weight: bold; }
        .qty-num { font-size: 36px; font-weight: bold; border-bottom: 3px solid #ddd; min-width: 70px; text-align: center; }

        /* 底部導覽 */
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #ddd; padding: 10px; z-index: 1000; }
        .footer-nav button { flex: 1; background: none; border: none; font-weight: bold; padding: 10px; font-size: 16px; color: #666; }
        .footer-nav button.active { color: var(--primary); }

        @media print {
            @page { margin: 0; }
            body { margin: 1cm; visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; font-size: 16px; color: black; }
            .print-title { font-size: 24px; font-weight: bold; text-align: center; }
            .order-card-btns { display: none !important; }
        }
    </style>
</head>
<body>

    <div id="page-order">
        <h2>🍴 品味餐館 - 點餐</h2>
        <div id="category-tabs-display" class="category-tabs"></div>
        <div id="menu-display" class="menu-grid"></div>
        <div class="cart-card">
            <div id="cart-items"></div>
            <div style="margin-top:10px;"><input type="text" id="cust-name" placeholder="桌號 / 客名 (選填)" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; font-size:16px;"></div>
            <div style="font-size: 2.2em; font-weight: 900; color: var(--danger); text-align: right; margin: 10px 0;">$ <span id="cart-total">0</span></div>
            <button onclick="submitOrder()" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; font-size:1.5em; font-weight:bold;">成立訂單</button>
        </div>
    </div>

    <div id="page-queue" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div id="daily-total-display" style="font-weight:bold; color:var(--danger); font-size:1.1em;">今日累計: $0</div>
            <button onclick="dailySettlement()" style="background:var(--warning); border:none; padding:8px 12px; border-radius:8px; font-weight:bold;">💰 今日結算</button>
        </div>
        <div class="category-tabs">
            <div id="tab-wait" class="tab active" onclick="switchQueueTab('waiting')">未完成</div>
            <div id="tab-done" class="tab" onclick="switchQueueTab('done')">已完成</div>
        </div>
        <div id="queue-orders-list"></div>
    </div>

    <div id="qty-modal" class="modal" style="z-index: 3000;">
        <div class="modal-content" style="margin-top: 15%;">
            <h3 id="qty-modal-title" style="text-align:center;"></h3>
            <div class="qty-input-group">
                <button class="btn-circle" onclick="adjustModalQty(-1)">-</button>
                <div class="qty-num" id="modal-qty-val">1</div>
                <button class="btn-circle" onclick="adjustModalQty(1)">+</button>
            </div>
            <div id="memo-tags-display" class="memo-tags"></div>
            <input type="text" id="modal-memo-input" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; font-size:16px;" placeholder="手寫備註...">
            <button onclick="confirmQtyAction()" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; font-size:20px; font-weight:bold; margin-top:20px;">加入清單</button>
            <button onclick="closeModal('qty-modal')" style="width:100%; padding:10px; border:none; background:none; color:gray;">取消</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0 0 15px 0;">⚙️ 系統設定</h2>
            
            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)">📈 歷史營收報表 (31天)</div>
                <div class="admin-content" id="history-list"></div>
            </div>

            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)">🍎 菜單品項管理</div>
                <div class="admin-content" id="admin-menu-list"></div>
            </div>

            <div class="admin-section">
                <div class="admin-header" onclick="toggleAdminSection(this)">💬 常用備註標籤管理</div>
                <div class="admin-content">
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <input type="text" id="new-memo-input" placeholder="新標籤名稱" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:5px;">
                        <button onclick="addMemoLabel()" style="padding:8px 15px; background:var(--primary); color:white; border:none; border-radius:5px;">新增</button>
                    </div>
                    <div id="admin-memo-list" class="memo-tags"></div>
                </div>
            </div>

            <hr style="margin:20px 0;">
            <button onclick="closeModal('settings-modal')" style="width:100%; padding:15px; background:var(--dark); color:white; border:none; border-radius:10px; font-weight:bold;">完成並退出</button>
        </div>
    </div>

    <div id="print-area"></div>

    <div class="footer-nav">
        <button id="nav-order" class="active" onclick="showPage('order')">🔘 點餐</button>
        <button id="nav-queue" onclick="showPage('queue')">📋 等單 (<span id="queue-count">0</span>)</button>
        <button onclick="openSettings()">⚙️ 管理/報表</button>
    </div>

    <script>
        const catWeight = { "主食": 1, "湯品": 2, "小菜": 3 };
        let menu = JSON.parse(localStorage.getItem('myMenu')) || [{name:'肉燥飯', price:35, category:'主食'}];
        let memos = JSON.parse(localStorage.getItem('myMemos')) || ['微辣','❌蔥','外帶','加辣','不要辣'];
        let cart = [], orders = JSON.parse(localStorage.getItem('myOrders')) || [];
        let history = JSON.parse(localStorage.getItem('myHistory')) || [];
        let currentCat = '主食', queueTab = 'waiting';

        function init() { renderTabs(); renderMenu(currentCat); renderCart(); renderQueue(); }
        function showPage(p) {
            document.getElementById('page-order').style.display = p==='order'?'block':'none';
            document.getElementById('page-queue').style.display = p==='queue'?'block':'none';
            document.getElementById('nav-order').className = p==='order'?'active':'';
            document.getElementById('nav-queue').className = p==='queue'?'active':'';
            if(p==='queue') renderQueue();
        }
        function switchQueueTab(t) { queueTab = t; renderQueue(); }

        function toggleAdminSection(header) { header.parentElement.classList.toggle('active'); }
        function toggleSubAdmin(header) { header.parentElement.classList.toggle('active'); }

        // --- 點餐功能 ---
        function renderTabs() {
            document.getElementById('category-tabs-display').innerHTML = ['主食','湯品','小菜'].map(c => `<div class="tab ${c===currentCat?'active':''}" onclick="changeCat('${c}')">${c}</div>`).join('');
        }
        function changeCat(c) { currentCat = c; renderTabs(); renderMenu(c); }
        function renderMenu(cat) {
            document.getElementById('menu-display').innerHTML = menu.filter(m => m.category === cat).map(i => `<div class="menu-item" onclick="openQtyModal('${i.name}', ${i.price}, '${i.category}')"><b>${i.name}</b> <span>$${i.price}</span></div>`).join('');
        }
        function openQtyModal(name, price, category) {
            currentItemTarget = { name, price, category };
            document.getElementById('qty-modal-title').innerText = name;
            document.getElementById('modal-qty-val').innerText = "1";
            document.getElementById('modal-memo-input').value = "";
            document.getElementById('memo-tags-display').innerHTML = memos.map(m => `<button class="memo-btn" onclick="addMemoToInput('${m}')">${m}</button>`).join('') + `<button class="memo-btn" style="background:#eee;" onclick="document.getElementById('modal-memo-input').value=''">🧹</button>`;
            document.getElementById('qty-modal').style.display = 'block';
        }
        function addMemoToInput(t) { let i = document.getElementById('modal-memo-input'); i.value = i.value ? i.value+","+t : t; }
        function adjustModalQty(d) { let v = parseInt(document.getElementById('modal-qty-val').innerText); document.getElementById('modal-qty-val').innerText = Math.max(1, v+d); }
        function confirmQtyAction() {
            if(!currentItemTarget) return;
            const qty = parseInt(document.getElementById('modal-qty-val').innerText);
            const memo = document.getElementById('modal-memo-input').value;
            const ex = cart.find(i=>i.name===currentItemTarget.name && i.memo===memo);
            if(ex) ex.qty += qty; else cart.push({...currentItemTarget, qty, memo});
            cart.sort((a,b) => (catWeight[a.category]||99)-(catWeight[b.category]||99));
            renderCart(); closeModal('qty-modal');
        }
        function renderCart() {
            let t = 0;
            document.getElementById('cart-items').innerHTML = cart.map((i,idx) => { t+=i.price*i.qty; return `<div style="padding:10px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between;"><div><b>${i.name} x ${i.qty}</b><br><small style="color:red;">${i.memo?'('+i.memo+')':''}</small></div><button onclick="cart.splice(${idx},1);renderCart()" style="color:red; border:none; background:none; font-size:20px;">✕</button></div>`; }).join('') || '<p style="text-align:center; color:gray;">🛒 購物車為空</p>';
            document.getElementById('cart-total').innerText = t;
        }
        function submitOrder() {
            if(!cart.length) return;
            orders.unshift({ id: Date.now(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), name: document.getElementById('cust-name').value.trim(), items: [...cart], total: document.getElementById('cart-total').innerText, status: 'waiting' });
            localStorage.setItem('myOrders', JSON.stringify(orders)); 
            cart = []; renderCart(); document.getElementById('cust-name').value = "";
            showPage('queue');
        }

        // --- 訂單管理 ---
        function renderQueue() {
            const list = orders.filter(o => o.status === queueTab);
            const totalRevenue = orders.filter(o => o.status === 'done').reduce((sum, o) => sum + parseInt(o.total), 0);
            document.getElementById('daily-total-display').innerText = `今日累計: $${totalRevenue}`;
            document.getElementById('queue-count').innerText = orders.filter(o=>o.status==='waiting').length;
            document.getElementById('tab-wait').className = queueTab==='waiting'?'tab active':'tab';
            document.getElementById('tab-done').className = queueTab==='done'?'tab active':'tab';
            
            let html = (queueTab === 'done' && list.length > 0) ? `<button onclick="clearDoneOrders()" style="width:100%; padding:10px; background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; border-radius:8px; margin-bottom:15px; font-weight:bold;">🗑️ 一鍵清空「已完成」訂單</button>` : "";
            html += list.map(o => `
                <div class="order-card ${o.status==='done'?'done':''}">
                    <b>👤 ${o.name || '(未填)'}</b> <small>🕒 ${o.time}</small><br>
                    ${o.items.map(i => `• ${i.name} x ${i.qty} <span style="color:red;">${i.memo?'('+i.memo+')':''}</span>`).join('<br>')}
                    <div style="text-align:right; font-weight:bold; color:var(--danger);">$${o.total}</div>
                    <div class="order-card-btns" style="display:flex; gap:10px; margin-top:10px;">
                        ${o.status==='waiting' ? `
                            <button onclick="updateStatus(${o.id}, 'done')" style="flex:2; padding:10px; background:var(--success); color:white; border:none; border-radius:8px;">✅ 結單</button>
                            <button onclick="editOrder(${o.id})" style="flex:1; background:var(--primary); color:white; border:none; border-radius:8px;">✏️ 修改</button>
                        ` : ''}
                        <button onclick="printOrder(${o.id})" style="flex:1; background:var(--dark); color:white; border:none; border-radius:8px; padding:10px;">🖨️ 列印</button>
                        <button onclick="deleteOrder(${o.id})" style="flex:1; color:red; border:none; background:none; font-size:12px;">🗑️ 刪除</button>
                    </div>
                </div>`).join('') || '<p style="text-align:center; padding:20px;">尚無紀錄</p>';
            document.getElementById('queue-orders-list').innerHTML = html;
        }

        function updateStatus(id, s) { let o = orders.find(o=>o.id===id); if(o) o.status=s; localStorage.setItem('myOrders', JSON.stringify(orders)); renderQueue(); }
        function editOrder(id) {
            let o = orders.find(o=>o.id===id);
            if(confirm('撤回修改？')) {
                cart = [...o.items]; document.getElementById('cust-name').value = o.name;
                orders = orders.filter(x=>x.id!==id); localStorage.setItem('myOrders', JSON.stringify(orders));
                renderCart(); showPage('order');
            }
        }
        function clearDoneOrders() { if(confirm('清空已完成？')){orders=orders.filter(o=>o.status!=='done');localStorage.setItem('myOrders',JSON.stringify(orders));renderQueue();}}
        function deleteOrder(id) { if(confirm('刪除訂單？')){orders=orders.filter(o=>o.id!==id);localStorage.setItem('myOrders',JSON.stringify(orders));renderQueue();}}

        function dailySettlement() {
            const done = orders.filter(o => o.status === 'done');
            const total = done.reduce((sum, o) => sum + parseInt(o.total), 0);
            if(total === 0) return alert('無營業額可結算');
            if(confirm(`結算今日：$${total}？`)) {
                history.unshift({ date: new Date().toLocaleDateString(), amount: total });
                if(history.length > 31) history.pop();
                localStorage.setItem('myHistory', JSON.stringify(history));
                orders = orders.filter(o => o.status !== 'done');
                localStorage.setItem('myOrders', JSON.stringify(orders));
                renderQueue();
            }
        }

        // --- 修正後的列印功能 ---
        function printOrder(id) { 
            const o = orders.find(x => x.id === id);
            const nowTime = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            const p = document.getElementById('print-area'); 
            
            // 修正邏輯：有客名時直接顯示名字，不顯示「客名：」字眼
            const nameHeader = o.name ? `<div style="display:flex; justify-content:space-between; font-size:18px; font-weight:bold;"><span>${o.name}</span><span>${nowTime}</span></div>` 
                                      : `<div style="text-align:right; font-size:18px; font-weight:bold;">${nowTime}</div>`;
            
            p.innerHTML = `<div class="print-title">品味餐館</div><hr>${nameHeader}<hr>${o.items.map(i => `<div style="font-size:18px; margin:3px 0;">• ${i.name} x ${i.qty}</div>${i.memo ? `<div style="padding-left:15px;">> ${i.memo}</div>` : ''}`).join('')}<hr><div style="text-align:right; font-size:22px; font-weight:bold;">總計: $${o.total}</div><div style="height:50px;"></div>`; 
            window.print(); 
            p.innerHTML = "";
        }

        // --- 設定管理 ---
        function openSettings() {
            renderHistoryList();
            renderAdminMenuLists();
            renderAdminMemoList();
            document.getElementById('settings-modal').style.display = 'block';
        }

        function renderHistoryList() {
            document.getElementById('history-list').innerHTML = history.map(h => `<div style="padding:8px 0; border-bottom:1px solid #eee;">📅 ${h.date}：<b>$${h.amount}</b></div>`).join('') || '尚無紀錄';
        }

        function renderAdminMenuLists() {
            let h = ""; 
            ['主食','湯品','小菜'].forEach(c => { 
                let it = menu.filter(m=>m.category===c); 
                h += `
                <div class="sub-admin-section">
                    <div class="sub-admin-header" onclick="toggleSubAdmin(this)">${c}類 (${it.length})</div>
                    <div class="sub-admin-content">
                        ${it.map(m=>{let idx=menu.indexOf(m);return `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;"><span>${m.name}($${m.price})</span><button onclick="deleteMenuItem(${idx})" style="color:red; border:1px solid red; border-radius:5px; padding:2px 8px; font-size:12px;">刪除</button></div>`}).join('') || '<div style="padding:10px; color:gray;">暫無項目</div>'}
                    </div>
                </div>`;
            });
            document.getElementById('admin-menu-list').innerHTML = h;
        }

        function deleteMenuItem(i) { if(confirm('刪除？')){menu.splice(i,1); localStorage.setItem('myMenu',JSON.stringify(menu)); renderAdminMenuLists(); renderMenu(currentCat);}}

        function renderAdminMemoList() {
            document.getElementById('admin-memo-list').innerHTML = memos.map((m,idx) => `<div class="memo-btn" style="display:flex; align-items:center; gap:8px;">${m} <span onclick="deleteMemoLabel(${idx})" style="color:red; cursor:pointer;">✕</span></div>`).join('') || '無標籤';
        }
        function addMemoLabel() {
            let i = document.getElementById('new-memo-input');
            if(i.value.trim()){ memos.push(i.value.trim()); i.value=''; localStorage.setItem('myMemos', JSON.stringify(memos)); renderAdminMemoList(); }
        }
        function deleteMemoLabel(idx) { if(confirm('刪除標籤？')){memos.splice(idx,1); localStorage.setItem('myMemos', JSON.stringify(memos)); renderAdminMemoList();}}

        function closeModal(id) { document.getElementById(id).style.display='none'; }
        
        init();
    </script>
</body>
</html>
