<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小餐館 POS - 品項歸類版</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --dark: #343a40; --bg: #f4f7f6; }
        body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 10px; background: var(--bg); padding-bottom: 120px; }
        .category-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; background: white; border: 1px solid #ddd; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .menu-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 20px; background: white; border-radius: 12px; cursor: pointer; border: 1px solid #eee; }
        .cart-card { background: #fff; padding: 15px; border-radius: 15px; border: 2px solid var(--primary); }
        .order-card { background: white; border-left: 6px solid var(--warning); padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; }
        .modal-content { background: white; margin: 3% auto; padding: 20px; width: 88%; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
        .qty-input-group { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
        .btn-circle { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--primary); background: white; color: var(--primary); font-size: 28px; font-weight: bold; }
        .qty-num { font-size: 36px; font-weight: bold; border-bottom: 3px solid #ddd; min-width: 70px; text-align: center; }
        .memo-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .memo-btn { padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; background: white; font-weight: bold; }
        .footer-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #ddd; padding: 10px; z-index: 1000; }
        .footer-nav button { flex: 1; background: none; border: none; font-weight: bold; padding: 10px; font-size: 16px; color: #666; }
        .footer-nav button.active { color: var(--primary); }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 48mm; font-size: 14px; line-height: 1.2; color: black; }
            .print-title { font-size: 18px; font-weight: bold; text-align: center; }
            .print-line { border-top: 1px dashed black; margin: 5px 0; }
            .print-gap { height: 50px; }
        }
    </style>
</head>
<body>

    <div id="page-order">
        <h2>🍴 點餐收銀</h2>
        <div id="category-tabs-display" class="category-tabs"></div>
        <div id="menu-display" class="menu-grid"></div>
        <div class="cart-card">
            <div id="cart-items"></div>
            <div style="margin-top:10px;"><input type="text" id="cust-name" placeholder="桌號/客名" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; font-size:16px;"></div>
            <div style="font-size: 2.2em; font-weight: 900; color: var(--danger); text-align: right; margin: 10px 0;">$ <span id="cart-total">0</span></div>
            <button onclick="submitOrder()" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; font-size:1.5em; font-weight:bold;">成立訂單</button>
        </div>
    </div>

    <div id="page-queue" style="display:none;">
        <h2>⏳ 等單管理 (點單可修改)</h2>
        <div id="waiting-orders"></div>
    </div>

    <div id="edit-order-modal" class="modal">
        <div class="modal-content">
            <h3 id="edit-order-title" style="margin-top:0;">修改訂單</h3>
            <div id="edit-category-tabs" class="category-tabs"></div>
            <div id="edit-menu-display" class="menu-grid" style="max-height: 200px; overflow-y: auto; background: #eee; border-radius: 10px; padding: 10px;"></div>
            <div style="margin-top:15px; border: 2px solid var(--warning); padding: 12px; border-radius: 12px; background: #fffcf0;">
                <div style="font-weight:bold;">當前清單 (品項已歸類)：</div>
                <div id="edit-cart-items" style="margin: 10px 0;"></div>
                <div style="text-align:right; font-size: 1.8em; font-weight: bold; color: var(--danger);">$ <span id="edit-cart-total">0</span></div>
            </div>
            <button onclick="saveOrderEdit()" style="width:100%; padding:20px; background:var(--success); color:white; border:none; border-radius:12px; font-size:22px; font-weight:bold; margin-top:20px;">✅ 確認修改並儲存</button>
            <button onclick="closeEditModal()" style="width:100%; padding:10px; border:none; background:none; color:gray; margin-top:10px;">❌ 放棄修改</button>
        </div>
    </div>

    <div id="qty-modal" class="modal" style="z-index: 3000;">
        <div class="modal-content" style="margin-top: 15%;">
            <h3 id="qty-modal-title" style="text-align:center;"></h3>
            <div class="qty-input-group">
                <button class="btn-circle" onclick="adjustModalQty(-1)">-</button>
                <div class="qty-num" id="modal-qty-val">1</div>
                <button class="btn-circle" onclick="adjustModalQty(1)">+</button>
            </div>
            <div style="font-weight:bold;">備註：</div>
            <div id="memo-tags-display" class="memo-tags"></div>
            <input type="text" id="modal-memo-input" style="width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; font-size:16px;" placeholder="手寫要求...">
            <button id="qty-confirm-btn" style="width:100%; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; font-size:20px; font-weight:bold; margin-top:20px;">確認</button>
            <button onclick="closeModal('qty-modal')" style="width:100%; padding:10px; border:none; background:none; color:gray;">取消</button>
        </div>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">⚙️ 設定</h2>
            <div id="admin-menu-list" style="border:1px solid #eee; border-radius:8px; max-height:150px; overflow-y:auto; margin-bottom:10px;"></div>
            <div style="background:#f9f9f9; padding:10px; border-radius:8px; display:flex; flex-wrap:wrap; gap:5px;">
                <input type="text" id="new-item-name" placeholder="品名" style="width:48%; padding:8px;">
                <input type="number" id="new-item-price" placeholder="價格" style="width:48%; padding:8px;">
                <select id="new-item-cat" style="width:100%; padding:8px;"><option value="主食">主食</option><option value="湯品">湯品</option><option value="小菜">小菜</option></select>
                <button onclick="addItem()" style="width:100%; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px;">新增</button>
            </div>
            <hr>
            <div id="admin-memo-list" style="border:1px solid #eee; border-radius:8px; max-height:120px; overflow-y:auto; margin-bottom:10px;"></div>
            <div style="display:flex; gap:5px;"><input type="text" id="new-memo-text" style="flex:1; padding:8px;"><button onclick="addMemo()" style="padding:8px 20px; background:var(--success); color:white; border:none; border-radius:5px;">新增</button></div>
            <button onclick="closeModal('settings-modal')" style="width:100%; margin-top:30px; padding:15px; background:var(--dark); color:white; border:none; border-radius:10px;">退出</button>
        </div>
    </div>

    <div id="print-area"></div>
    <div class="footer-nav">
        <button id="nav-order" class="active" onclick="showPage('order')">🔘 點餐</button>
        <button id="nav-queue" onclick="showPage('queue')">📋 等單 (<span id="queue-count">0</span>)</button>
        <button onclick="openSettings()">⚙️ 設定</button>
    </div>

    <script>
        let menu = JSON.parse(localStorage.getItem('myMenu')) || [{name:'肉燥飯', price:35, category:'主食'},{name:'貢丸湯', price:30, category:'湯品'}];
        let memos = JSON.parse(localStorage.getItem('myMemos')) || ['微辣','❌蔥'];
        let cart = [], orders = JSON.parse(localStorage.getItem('myOrders')) || [];
        let currentItemTarget = null, currentCat = '主食', editingOrderId = null, tempEditCart = [];

        function init() { renderTabs(); renderMenu(currentCat); renderCart(); renderQueue(); }

        function showPage(p) {
            document.getElementById('page-order').style.display = p==='order'?'block':'none';
            document.getElementById('page-queue').style.display = p==='queue'?'block':'none';
            document.getElementById('nav-order').className = p==='order'?'active':'';
            document.getElementById('nav-queue').className = p==='queue'?'active':'';
        }

        function renderTabs(targetId = 'category-tabs-display', onClickFn = 'changeCat') {
            const cats = ['主食', '湯品', '小菜'];
            document.getElementById(targetId).innerHTML = cats.map(c => `<div class="tab ${c===currentCat?'active':''}" onclick="${onClickFn}('${c}')">${c}</div>`).join('');
        }
        function changeCat(c) { currentCat = c; renderTabs(); renderMenu(c); }
        function changeEditCat(c) { currentCat = c; renderTabs('edit-category-tabs', 'changeEditCat'); renderEditMenu(c); }

        function renderMenu(cat) {
            const list = menu.filter(m => m.category === cat);
            document.getElementById('menu-display').innerHTML = list.map(i => `<div class="menu-item" onclick="openQtyModal('${i.name}', ${i.price}, 'add')"><b>${i.name}</b> <span>$${i.price}</span></div>`).join('');
        }
        function renderEditMenu(cat) {
            const list = menu.filter(m => m.category === cat);
            document.getElementById('edit-menu-display').innerHTML = list.map(i => `<div class="menu-item" style="padding:15px;" onclick="openQtyModal('${i.name}', ${i.price}, 'editAdd')"><b>${i.name}</b> <span>$${i.price}</span></div>`).join('');
        }

        function openQtyModal(name, price, mode, idx = null) {
            currentItemTarget = { name, price, mode, idx };
            document.getElementById('qty-modal-title').innerText = name;
            document.getElementById('modal-qty-val').innerText = (mode === 'editExist') ? tempEditCart[idx].qty : "1";
            document.getElementById('modal-memo-input').value = (mode === 'editExist') ? tempEditCart[idx].memo : "";
            document.getElementById('qty-confirm-btn').onclick = confirmQtyAction;
            document.getElementById('memo-tags-display').innerHTML = memos.map(m => `<button class="memo-btn" onclick="addMemoTag('${m}')">${m}</button>`).join('') + `<button class="memo-btn" style="background:#eee;" onclick="document.getElementById('modal-memo-input').value=''">🧹</button>`;
            document.getElementById('qty-modal').style.display = 'block';
        }
        function addMemoTag(tag) {
            let input = document.getElementById('modal-memo-input');
            input.value = input.value ? input.value + "," + tag : tag;
        }
        function adjustModalQty(d) {
            let v = parseInt(document.getElementById('modal-qty-val').innerText);
            document.getElementById('modal-qty-val').innerText = Math.max(1, v + d);
        }

        // --- 自動合併與「品名歸類排序」邏輯 ---
        function processCartSorting(targetCart) {
            // 先依品名排序，品名一樣再依備註排序
            targetCart.sort((a, b) => {
                if (a.name !== b.name) return a.name.localeCompare(b.name, 'zh-TW');
                return a.memo.localeCompare(b.memo, 'zh-TW');
            });
        }

        function addToTargetCart(targetCart, newItem) {
            let existing = targetCart.find(i => i.name === newItem.name && i.memo === newItem.memo);
            if (existing) {
                existing.qty += newItem.qty;
            } else {
                targetCart.push(newItem);
            }
            processCartSorting(targetCart); // 每次加入後自動重新排序歸類
        }

        function confirmQtyAction() {
            const qty = parseInt(document.getElementById('modal-qty-val').innerText);
            const memo = document.getElementById('modal-memo-input').value;
            const newItem = { name: currentItemTarget.name, price: currentItemTarget.price, qty, memo };

            if(currentItemTarget.mode === 'add') {
                addToTargetCart(cart, newItem);
                renderCart();
            } else if(currentItemTarget.mode === 'editAdd') {
                addToTargetCart(tempEditCart, newItem);
                renderEditCart();
            } else if(currentItemTarget.mode === 'editExist') {
                tempEditCart[currentItemTarget.idx].qty = qty;
                tempEditCart[currentItemTarget.idx].memo = memo;
                processCartSorting(tempEditCart); // 修改後也重新排序
                renderEditCart();
            }
            closeModal('qty-modal');
        }

        function renderCart() {
            let total = 0;
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => {
                total += i.price * i.qty;
                return `<div style="padding:10px 0; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${i.name} x ${i.qty}</b><br><small style="color:red;">${i.memo ? '('+i.memo+')' : ''}</small></div>
                    <button onclick="cart.splice(${idx},1);renderCart()" style="color:red; border:none; background:none; font-size:20px;">✕</button>
                </div>`;
            }).join('') || '<p style="text-align:center; color:gray;">🛒 尚未點餐</p>';
            document.getElementById('cart-total').innerText = total;
        }

        function submitOrder() {
            if(!cart.length) return;
            orders.unshift({ id: Date.now(), time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), name: document.getElementById('cust-name').value || '現場客', items: [...cart], total: document.getElementById('cart-total').innerText, status: 'waiting' });
            localStorage.setItem('myOrders', JSON.stringify(orders));
            cart = []; renderCart(); renderQueue(); document.getElementById('cust-name').value = "";
        }

        function renderQueue() {
            const wait = orders.filter(o => o.status === 'waiting');
            document.getElementById('queue-count').innerText = wait.length;
            document.getElementById('waiting-orders').innerHTML = wait.map(o => `
                <div class="order-card">
                    <div onclick="openEditOrder(${o.id})" style="cursor:pointer;">
                        <div style="display:flex; justify-content:space-between;"><b>👤 ${o.name}</b> <span>🕒 ${o.time}</span></div>
                        <div style="margin:8px 0; border-top:1px dashed #eee; padding-top:5px; line-height:1.6;">
                            ${o.items.map(i => `• ${i.name} x ${i.qty} <span style="color:red;">${i.memo ? '('+i.memo+')' : ''}</span>`).join('<br>')}
                        </div>
                        <div style="text-align:right; font-weight:bold; color:var(--danger); font-size:1.3em;">$${o.total}</div>
                    </div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick="updateStatus(${o.id}, 'done')" style="flex:2; padding:12px; background:var(--success); color:white; border:none; border-radius:8px; font-weight:bold;">完成</button>
                        <button onclick="printOrder(${o.id})" style="flex:1; background:var(--dark); color:white; border:none; border-radius:8px;">列印</button>
                        <button onclick="deleteOrder(${o.id})" style="flex:1; background:#eee; color:red; border:none; border-radius:8px;">刪除</button>
                    </div>
                </div>`).join('') || '<p style="text-align:center; padding:20px;">目前沒有訂單</p>';
        }

        function openEditOrder(id) {
            editingOrderId = id;
            const order = orders.find(o => o.id === id);
            tempEditCart = JSON.parse(JSON.stringify(order.items)); 
            document.getElementById('edit-order-title').innerText = "修改訂單：" + order.name;
            renderEditCart();
            renderTabs('edit-category-tabs', 'changeEditCat');
            renderEditMenu(currentCat);
            document.getElementById('edit-order-modal').style.display = 'block';
        }

        function renderEditCart() {
            let total = 0;
            document.getElementById('edit-cart-items').innerHTML = tempEditCart.map((i, idx) => {
                total += i.price * i.qty;
                return `<div style="padding:10px 0; border-bottom:1px solid #ddd; display:flex; justify-content:space-between; align-items:center;">
                    <div onclick="openQtyModal('${i.name}', ${i.price}, 'editExist', ${idx})" style="flex:1;">
                        <b>${i.name} x ${i.qty}</b> <br><small style="color:red;">${i.memo ? '('+i.memo+')' : ''}</small>
                    </div>
                    <button onclick="tempEditCart.splice(${idx},1);renderEditCart()" style="color:red; border:none; background:none; font-size:22px;">✕</button>
                </div>`;
            }).join('') || '<p style="color:gray;">內容為空</p>';
            document.getElementById('edit-cart-total').innerText = total;
        }

        function saveOrderEdit() {
            const orderIdx = orders.findIndex(o => o.id === editingOrderId);
            orders[orderIdx].items = [...tempEditCart];
            orders[orderIdx].total = document.getElementById('edit-cart-total').innerText;
            localStorage.setItem('myOrders', JSON.stringify(orders));
            renderQueue();
            closeModal('edit-order-modal');
        }

        function closeEditModal() { if(confirm('放棄修改？')) closeModal('edit-order-modal'); }
        function openSettings() { renderAdminLists(); document.getElementById('settings-modal').style.display = 'block'; }
        function renderAdminLists() {
            document.getElementById('admin-menu-list').innerHTML = menu.map((m, i) => `<div style="display:flex; justify-content:space-between; padding:8px;"><span>${m.name}($${m.price})</span><button onclick="deleteItem(${i})" style="color:red; border:none; background:none;">刪除</button></div>`).join('');
            document.getElementById('admin-memo-list').innerHTML = memos.map((m, i) => `<div style="display:flex; justify-content:space-between; padding:8px;"><span>${m}</span><button onclick="deleteMemo(${i})" style="color:red; border:none; background:none;">刪除</button></div>`).join('');
        }
        function addItem() { const n = document.getElementById('new-item-name').value, p = document.getElementById('new-item-price').value, c = document.getElementById('new-item-cat').value; if(n && p) { menu.push({name:n, price:parseInt(p), category:c}); saveAndRefresh(); } }
        function addMemo() { const t = document.getElementById('new-memo-text').value; if(t) { memos.push(t); saveAndRefresh(); } }
        function deleteItem(i) { menu.splice(i, 1); saveAndRefresh(); }
        function deleteMemo(i) { memos.splice(i, 1); saveAndRefresh(); }
        function saveAndRefresh() { localStorage.setItem('myMenu', JSON.stringify(menu)); localStorage.setItem('myMemos', JSON.stringify(memos)); renderAdminLists(); renderMenu(currentCat); }
        function updateStatus(id, s) { orders.find(o=>o.id===id).status = s; localStorage.setItem('myOrders', JSON.stringify(orders)); renderQueue(); }
        function deleteOrder(id) { if(confirm('刪除？')) { orders = orders.filter(o=>o.id!==id); localStorage.setItem('myOrders', JSON.stringify(orders)); renderQueue(); } }
        function printOrder(id) {
            const o = orders.find(x => x.id === id);
            const p = document.getElementById('print-area');
            // 列印時也確保品項歸類排序
            processCartSorting(o.items);
            p.innerHTML = `<div class="print-title">收據</div><div class="print-line"></div><div>${o.name} / ${o.time}</div><div class="print-line"></div>${o.items.map(i => `<div>${i.name} x ${i.qty}</div>${i.memo ? `<div>> ${i.memo}</div>` : ''}`).join('')}<div class="print-line"></div><div style="text-align:right;">總計: $${o.total}</div><div class="print-gap"></div>`;
            window.print();
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        init();
    </script>
</body>
</html>
